<!-- WAP to create a basic graphical Calculator using HTML and JavaScript. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main{
            background-color: dimgray;
            height: 70vh;
            width: 25vw;
            color: white;
            border-radius: 15px;
            align-items: center;
            text-align: center;
        }
        #display{
            height: 20vh;
            width: 24vw;
            border: 1px solid white;
            margin: 5px 5px;
            border-radius: 5px;
            font-size: xx-large;
            background-color: whitesmoke;
        }
        .btn{
            border: 1px solid rgb(149, 144, 144);
            background-color:lavender;
            height: 7vh;
            width: 5vw;
            font-size: x-large;
            padding: 10px;
            margin: 3px 5px;
            border-radius: 5px;
            /* margin-left: 15px;
            margin-top: 2.5px; */
        }
        button:hover{
            background-color: rgb(237, 158, 237);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="main">
        <div>
            <input type="text" id="display">
        </div>
        <div>
            
                    <button class="btn" onclick="clearDisplay()">AC</button>
                    <button class="btn" onclick="lastNumDelete()">DEL</button>
                    <button class="btn" onclick="addValue('%')">%</button>
                    <button class="btn" onclick="addValue('/')">/</button>
                
                    <br><br>

                    <button class="btn" onclick="addValue('7')">7</button>
                    <button class="btn" onclick="addValue('8')">8</button>
                    <button class="btn" onclick="addValue('9')">9</button>
                    <button class="btn" onclick="addValue('*')">*</button>
                    
                    <br><br>

                    <button class="btn" onclick="addValue('4')">4</button>
                    <button class="btn" onclick="addValue('5')">5</button>
                    <button class="btn" onclick="addValue('6')">6</button>
                    <button class="btn" onclick="addValue('-')">-</button>

                    <br><br>
                
                    <button class="btn" onclick="addValue('1')">1</button>
                    <button class="btn" onclick="addValue('2')">2</button>
                    <button class="btn" onclick="addValue('3')">3</button>
                    <button class="btn" onclick="addValue('+')">+</button>

                    <br><br>
                
                    <button class="btn" onclick="addValue('00')">00</button>
                    <button class="btn" onclick="addValue('0')">0</button>
                    <button class="btn" onclick="addValue('.')">.</button>
                    <button class="btn" onclick="calculate()">=</button>
               
        </div>
    </div>
    <script>
        function addValue(value) {
            document.getElementById("display").value += value;
        }

        function calculate() {
            document.getElementById("display").value = eval(document.getElementById("display").value);
        }

        function clearDisplay() {
            document.getElementById("display").value = "";
        }
        function lastNumDelete(){
            let display = document.getElementById("display");
            display.value = display.value.substring(0, display.value.length - 1);
        }
    </script>
</body>
</html>
