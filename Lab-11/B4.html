<!-- Demonstrate the Array and Object Destructuring. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = [1,2,3,4];
        let  [x, y, ...rest] = a;
        console.log(rest);

        let name = "Urvashi";
        let [a1, a2, ...rest1] = name;
        console.log(rest1);

        const person = {
            firstName: "Urvashi",
            lastName: "Zinzuvadiya",
            college: "darshan",
            semester: 3,
            city: "rajkot",
            state: "gujarat",
            country: "INDIA"
        };
        let {firstName , lastName , ...any} = person;
        console.log(firstName);
        console.log(lastName); 
        console.log(any);
    </script>
</body>
</html>
