<!-- Demonstrate the ‘for of’ loop. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const a = [1,2,3,4];
        for(let temp of a){
            console.log(temp);
        }
    </script>
        
</body>
</html>
