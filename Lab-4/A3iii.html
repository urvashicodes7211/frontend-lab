<!-- WAP to display given patterns using JavaScript.
1
01
010
1010
10101
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n = parseInt(prompt("Enter n : "));
         let k = 0;
        for(let i=1;i<=n;i++){
            for(let j=1;j<=i;j++){
                if(k == 0){
                    k++;
                    document.write(k);
                }else if(k == 1){
                    k--;
                    document.write(k);
                }
            }

            document.write("<br/>");
        }
    </script>
</body>
</html>
