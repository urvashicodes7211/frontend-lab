<!-- WAP in JavaScript to print the GCD of two number. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = parseInt(prompt("Enter a : "));
        let b = parseInt(prompt("Enter b : "));

        if(a>b){
            if(a % b == 0){
                n = b % a;
                document.write(n); 
            }else{
                document.write(1);
            }
        }else{
            if(b % a == 0){
                n = a % b;
                document.write(n); 
            }else{
                document.write(1);
            }
        }
    </script>
</body>
</html>
