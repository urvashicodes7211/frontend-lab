<!-- WAP to read an array from the user and sort them using bubble sort.  -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n = parseInt(prompt("Enter n : "));
        let a = [];
        for(let i=0;i<n;i++){
            a[i] = parseInt(prompt("Enter number : "));
        }
        let temp;

        for(i=0;i<n;i++){
            for(let j=0;j<n-i+1;j++){
                if(a[j]>a[j+1]){
                    temp=a[j];
                    a[j]=a[j+1];
                    a[j+1]=temp;
                }
            }
        }
        document.write(a);
    </script>
</body>
</html>
