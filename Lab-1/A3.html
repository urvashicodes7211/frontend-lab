<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            border: 1px solid black;
            height: 200px;
            width: 200px;
            animation: moov 10s 2s 1;
            animation-iteration-count: infinite;
        }
        @keyframes moov {
            0% {
                margin-top: 0px;
                margin-left: 0px;
            }
            25% {
                margin-top: 0px;
                margin-left: 590px;
            }
            50% {
                margin-top: 590px;
                margin-left: 590px;
            }
            75% {
                margin-top: 590px;
                margin-left: 0px;
            }
            100% {
                margin-top: 0px;
                margin-left: 0px;
            }
        }
    </style>
</head>
<body>
    <div>

    </div>
</body>
</html>
